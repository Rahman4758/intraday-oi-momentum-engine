<!DOCTYPE html>
<html lang="en">
<head>
    <title>Alerts | Intraday Momentum System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header class="glass-panel" style="margin: 1.5rem 2rem;">
        <h1><a href="/" style="text-decoration:none; color:inherit;"><span class="brand-accent">⚡</span> Momentum System</a> / Alerts</h1>
    </header>
    
    <section class="alerts-section alerts-history" id="alerts-history-container">
        <!-- Rendered via JS -->
    </section>

    <script src="/static/js/app.js"></script>
    <script>
        // Only load alerts on this page
        document.addEventListener('DOMContentLoaded', () => {
            fetchAlertsPage();
        });

        async function fetchAlertsPage() {
            try {
                const res = await fetch('/api/alerts');
                const data = await res.json();
                if (data.status === 'success') {
                    const container = document.getElementById('alerts-history-container');
                    container.innerHTML = '';
                    if (data.data.length === 0) {
                        container.innerHTML = '<p style="color:var(--text-muted)">No alerts generated today.</p>';
                        return;
                    }
                    data.data.forEach(alert => {
                        container.appendChild(createAlertCard(alert));
                    });
                }
            } catch (e) {
                console.error("Error fetching alerts", e);
            }
        }
    </script>
</body>
</html>
